version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: music_mysql
    command: --lower-case-table-names=1
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: musicWeb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST_NAME=0.0.0.0
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASS=123456
      - DB_NAME=musicWeb
      - DB_PORT=3306
      - CLOUDINARY_CLOUD_NAME=dsmbpvjng
      - CLOUDINARY_API_KEY=597823734658792
      - CLOUDINARY_API_SECRET=8BadUB1gTIkIydOMELX_ajTY_W4
      - JWT_SECRET=your_secret_key_here
      - JWT_EXPIRES_IN=7d
      - FE_PORT=http://localhost:5173
      - MAIL_USER=thaithanhtam1608@gmail.com
      - MAIL_PASS=fsjs jloh zltv buwm
    depends_on:
      - mysql-db
    restart: unless-stopped

  frontend:
    build:
      context: ../WebNhac_FE
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
    container_name: music_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
